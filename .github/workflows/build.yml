name: Build All Platforms

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: Create platforms
        run: flutter create --platforms=android .
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Run tests
        run: flutter test
      
      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: Create platforms
        run: flutter create --platforms=web .
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Run tests
        run: flutter test
      
      - name: Build Web
        run: flutter build web --release
      
      - name: Upload Web
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: build/web
          retention-days: 14

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: Create platforms
        run: flutter create --platforms=ios .
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Run tests
        run: flutter test
      
      - name: Build iOS
        run: flutter build ios --release --no-codesign
      
      - name: Upload iOS
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/ios/iphoneos/Runner.app
          retention-days: 14

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: Install Linux dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang cmake ninja-build pkg-config libgtk-3-dev
      
      - name: Create platforms
        run: flutter create --platforms=linux .
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Run tests
        run: flutter test
      
      - name: Build Linux
        run: flutter build linux --release
      
      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: build/linux/x64/release/bundle
          retention-days: 14

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: Create platforms
        run: flutter create --platforms=windows .
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Run tests
        run: flutter test
      
      - name: Build Windows
        run: flutter build windows --release
      
      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/windows/x64/runner/Release
          retention-days: 14

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: Create platforms
        run: flutter create --platforms=macos .
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Run tests
        run: flutter test
      
      - name: Build macOS
        run: flutter build macos --release
      
      - name: Upload macOS
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: build/macos/Build/Products/Release/an_app.app
          retention-days: 14

  generate-readme:
    needs: [build-android, build-web, build-ios, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Generate README with download links
        run: |
          RUN_ID="${{ github.run_id }}"
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"
          
          cat > README.md << README
# Flutter Multi-Platform App

This Flutter app builds for 6 platforms automatically via GitHub Actions.

## Download Builds

| Platform | Status | Download |
|----------|--------|----------|
| Android | ✅ Built | [Download APK](https://github.com/${REPO}/actions/runs/${RUN_ID}/artifacts/android-apk) |
| iOS | ✅ Built | [Download App](https://github.com/${REPO}/actions/runs/${RUN_ID}/artifacts/ios-app) |
| Web | ✅ Built | [Download](https://github.com/${REPO}/actions/runs/${RUN_ID}/artifacts/web) |
| Linux | ✅ Built | [Download](https://github.com/${REPO}/actions/runs/${RUN_ID}/artifacts/linux) |
| Windows | ✅ Built | [Download](https://github.com/${REPO}/actions/runs/${RUN_ID}/artifacts/windows) |
| macOS | ✅ Built | [Download](https://github.com/${REPO}/actions/runs/${RUN_ID}/artifacts/macos) |

## Build Details

- **Workflow Run:** [#${RUN_ID}](https://github.com/${REPO}/actions/runs/${RUN_ID})
- **Commit:** ${SHA:0:7}
- **Branch:** ${BRANCH}
- **Artifacts Retention:** 14 days

## How to Build Locally

\`\`\`bash
# Install Flutter: https://flutter.dev/docs/get-started/install

# Get dependencies
flutter pub get

# Create platforms (if not exists)
flutter create --platforms=android,ios,web,linux,windows,macos .

# Build for specific platform
flutter build apk --release        # Android
flutter build ios --release        # iOS
flutter build web --release        # Web
flutter build linux --release      # Linux
flutter build windows --release    # Windows
flutter build macos --release      # macOS
\`\`\`

## CI/CD

This project uses GitHub Actions to build all platforms automatically on every push to main/master branch.

After each successful build, this README is updated with download links to the artifacts.
README

      - name: Commit and push README
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --staged --quiet || git commit -m "Update README with build artifacts [skip ci]"
          git push
