name: Build All Platforms

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Run tests
        run: flutter test
      
      - name: Accept Android licenses
        run: flutter doctor --android-licenses || true
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Build App Bundle
        run: flutter build appbundle --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
      
      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.sha }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Run tests
        run: flutter test
      
      - name: Create web platform
        run: flutter create --platforms=web .
      
      - name: Build Web
        run: flutter build web --release
      
      - name: Upload Web
        uses: actions/upload-artifact@v4
        with:
          name: web-${{ github.sha }}
          path: build/web
          retention-days: 30

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Run tests
        run: flutter test
      
      - name: Create iOS platform
        run: flutter create --platforms=ios .
      
      - name: Build iOS
        run: flutter build ios --release --no-codesign
      
      - name: Upload iOS
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-${{ github.sha }}
          path: build/ios/iphoneos/Runner.app
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop
      
      - name: Create Linux platform
        run: flutter create --platforms=linux .
      
      - name: Build Linux
        run: flutter build linux --release
      
      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ github.sha }}
          path: build/linux/x64/release/bundle
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
      
      - name: Create Windows platform
        run: flutter create --platforms=windows .
      
      - name: Build Windows
        run: flutter build windows --release
      
      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ github.sha }}
          path: build/windows/x64/runner/Release
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop
      
      - name: Create macOS platform
        run: flutter create --platforms=macos .
      
      - name: Build macOS
        run: flutter build macos --release
      
      - name: Upload macOS
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ github.sha }}
          path: build/macos/Build/Products/Release/an_app.app
          retention-days: 30
